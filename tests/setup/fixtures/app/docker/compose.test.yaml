services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 5

  analytics-db:
    image: postgres:17
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: analytics
    ports:
      - "5432"
    volumes:
      - ./analytics-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    ports:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test
      ANALYTICS_DATABASE_URL: postgresql://test:test@analytics-db:5432/analytics
      REDIS_URL: redis://cache:6379
      PORT: "3000"
    ports:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
      cache:
        condition: service_healthy
