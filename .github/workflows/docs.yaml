name: Docs

on:
    push:
        branches: [main]
        paths:
            - src/**
            - .github/workflows/docs.yaml
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    docs:
        uses: jterrazz/jterrazz-workflows/.github/workflows/docs.yaml@main
        with:
            node-version: '24'
